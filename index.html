<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Восстановление Data Matrix кодов «Честный ЗНАК» прямо в браузере" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <title>DM Recovery Scanner</title>
</head>
<body>
  <main id="app" data-state="IDLE">

    <!-- ── Camera stage ─────────────────────────────────── -->
    <div class="stage stage-camera" id="camera-stage">
      <video id="camera" playsinline muted autoplay></video>
      <div class="scrim"></div>

      <header class="status-bar">
        <div class="status-left">
          <span id="conn-dot" class="dot dot-on"></span>
          <span id="conn-label">offline</span>
        </div>
        <div class="status-right">
          <span id="state-label">IDLE</span>
          <span id="fps-label">0fps</span>
          <span id="frames-label">0f</span>
          <span id="latency-label"></span>
        </div>
      </header>

      <div class="reticle" id="reticle">
        <span class="corner tl"></span>
        <span class="corner tr"></span>
        <span class="corner bl"></span>
        <span class="corner br"></span>
        <div class="confidence" id="confidence"></div>
      </div>

      <button id="torch-btn" class="torch-btn" aria-label="torch" aria-pressed="false" hidden>☀</button>

      <!-- IDLE / start -->
      <section class="welcome" id="welcome">
        <h1>DM Recovery Scanner</h1>
        <p>
          Восстановление повреждённых Data Matrix кодов «Честный ЗНАК».
          Наведите камеру на код — браузер прочитает его и покажет
          чистую копию для кассового сканера.
        </p>
        <button id="start-btn" class="btn btn-accent">Включить камеру</button>
        <div id="cam-error" class="error-msg" role="alert"></div>
        <div id="lib-status" class="lib-status"></div>
      </section>

      <!-- Failure hint sheet -->
      <section class="hint" id="hint" hidden>
        <span id="hint-text"></span>
      </section>

      <!-- SUCCESS bottom sheet -->
      <section class="sheet" id="success-sheet" hidden>
        <header class="sheet-head">
          <h2>Код восстановлен</h2>
          <span class="sheet-conf" id="sheet-conf">—</span>
        </header>
        <dl class="sheet-meta" id="sheet-meta"></dl>
        <div class="sheet-actions">
          <button id="show-btn" class="btn btn-success">Показать код кассиру</button>
          <button id="rescan-btn" class="btn btn-neutral">Сканировать ещё раз</button>
        </div>
      </section>
    </div>

    <!-- ── POS display stage ────────────────────────────── -->
    <section class="stage stage-display" id="display-stage" hidden>
      <div class="display-hint">Поднесите сканер к экрану. Держите перпендикулярно, 8–15 см.</div>
      <canvas id="dm-canvas" class="dm-canvas"></canvas>
      <div class="display-payload" id="display-payload"></div>
      <div class="display-actions">
        <button id="boost-btn"  class="btn btn-neutral" aria-pressed="false">Крупнее</button>
        <button id="invert-btn" class="btn btn-neutral" aria-pressed="false">Инвертировать</button>
        <button id="close-display-btn" class="btn btn-success">Готово</button>
      </div>
    </section>

  </main>

  <!-- Hidden working canvas pool used by the pipeline -->
  <canvas id="work-canvas" hidden></canvas>
  <canvas id="regen-canvas" hidden></canvas>
  <canvas id="verify-canvas" hidden></canvas>

  <script type="module" src="app.js"></script>
</body>
</html>
